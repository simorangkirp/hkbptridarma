server:
  port: 8087

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/church_player_agent?useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: true

app:
  storage:
    incoming-dir: ./incoming
    played-dir: ./played