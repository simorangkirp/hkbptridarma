spring:
  profiles:
    active: local # <--- Jalur default kalau kamu pencet 'Run' di IntelliJ / VS Code laptop

---
# ----------------------------------------------------------------------
# CONFIGURATION FOR LOCAL DEVELOPMENT
# ----------------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: local
server:
  port: 8087

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/church_player_agent?useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: true

app:
  storage:
    incoming-dir: ./incoming
    played-dir: ./played

---
# ----------------------------------------------------------------------
# CONFIGURATION FOR VPS SERVER
# ----------------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: prod
server:
  port: 8080 # <--- Kita balikin ke port standar Nginx biar rapi

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tridarma_db?useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true
    username: admin@localhost
    password: C!l4ndakPuL0 # <--- Menggunakan user database yang kita bikin di awal
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false # Di server dimatikan saja biar log-nya gak penuh dan berat
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: true

app:
  storage:
    incoming-dir: /var/www/tridarma-backend/incoming
    played-dir: /var/www/tridarma-backend/played